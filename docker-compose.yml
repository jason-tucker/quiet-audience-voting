# Production compose file — used on the Ubuntu VPS.
# Pulls the :latest image from GHCR (auto-updated by Watchtower).

version: "3.8"

services:
  qav:
    image: ghcr.io/jason-tucker/quiet-audience-voting:latest
    container_name: qav
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - qav_data:/app/data
      - qav_uploads:/app/uploads
    environment:
      DATABASE_URL: "file:/app/data/prod.db"
      JWT_SECRET: "${JWT_SECRET}"
      INITIAL_ADMIN_PASSWORD: "${INITIAL_ADMIN_PASSWORD}"
      NEXT_PUBLIC_APP_URL: "https://qcffpoll.com"
      NODE_ENV: production
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  # Continuous SQLite backup via Litestream. Tails the WAL on /app/data/prod.db
  # and writes incremental WAL segments + hourly snapshots to qav_backups. See
  # litestream.yml for retention / off-VPS S3/R2 swap. Restore drill is
  # documented in wiki/Deployment-and-Operations.md.
  litestream:
    image: litestream/litestream:0.3.13
    container_name: qav-litestream
    restart: unless-stopped
    volumes:
      - qav_data:/data:ro
      - qav_backups:/backups
      - ./litestream.yml:/etc/litestream.yml:ro
    command: replicate

  watchtower:
    image: containrrr/watchtower
    container_name: qav-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "300"
      REPO_USER: "${GHCR_USER}"
      REPO_PASS: "${GHCR_TOKEN}"
      # containrrr/watchtower:latest ships a Docker client locked to API
      # v1.25; modern daemons (Docker 20.10+, API >=1.40) refuse it. Pin a
      # supported version so Watchtower can talk to the daemon. See #7.
      DOCKER_API_VERSION: "1.45"

volumes:
  qav_data:
  qav_uploads:
  qav_backups:
