name: Build and Push Dev Image

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  # Same gate as deploy-main but applied to the dev branch. See roadmap O5 (#24).
  verify:
    name: Lint, build, test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint (zero warnings)
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "file:./prisma/ci.db"
          JWT_SECRET: "ci-placeholder-not-used-at-runtime-${{ github.sha }}"
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Unit tests
        run: npm test

  build-push:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo owner
        id: repo
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ steps.repo.outputs.owner }}/quiet-audience-voting:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
